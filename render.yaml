services:
  - type: web
    name: kindergarten-is
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    buildCommand: |
      pip install -r requirements-postgres.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
      if [ "$DJANGO_RESET_DEMO" = "True" ]; then \
        python manage.py reset_demo; \
      else \
        python manage.py seed_demo; \
      fi
    startCommand: |
      gunicorn kindergarten_project.wsgi:application --bind 0.0.0.0:$PORT --workers 3
    healthCheckPath: /accounts/login/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: POSTGRES_REQUIRE_SSL
        value: "True"
      # Включите DJANGO_RESET_DEMO=True в Environment и сделайте Manual Deploy,
      # чтобы при следующем деплое выполнился reset_demo (flush + seed_demo).
      # После деплоя верните значение в False (или удалите переменную).
      - key: DJANGO_RESET_DEMO
        value: "False"
      - key: POSTGRES_HOST
        fromDatabase:
          name: kindergarten-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: kindergarten-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: kindergarten-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: kindergarten-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: kindergarten-db
          property: password

databases:
  - name: kindergarten-db
    plan: free
    region: frankfurt
    databaseName: kindergarten
    user: kg_user
